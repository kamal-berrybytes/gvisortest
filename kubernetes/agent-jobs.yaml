apiVersion: batch/v1
kind: Job
metadata:
  name: fibonacci-sandbox-executor
  namespace: fibonacci-agent
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: fibonacci-agent
        step: sandbox-execution
    spec:
      restartPolicy: OnFailure
      runtimeClassName: gvisor
      containers:
        - name: executor
          image: fibonacci-agent:latest
          imagePullPolicy: Never
          command: ["python", "/app/sandbox/gvisor_executor.py"]
          env:
            - name: KUBERNETES_MODE
              value: "true"
            - name: CODE_OUTPUT_DIR
              value: "/tmp/generated"
            - name: RUNTIME_CLASS
              value: "gvisor"
            - name: EXECUTION_TIMEOUT
              value: "30"
