apiVersion: batch/v1
kind: Job
metadata:
  name: fibonacci-code-generator
  namespace: fibonacci-agent
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: fibonacci-agent
        step: code-generation
    spec:
      restartPolicy: OnFailure
      runtimeClassName: gvisor
      containers:
        - name: generator
          image: fibonacci-agent:latest
          imagePullPolicy: Never
          command: ["python", "/app/agent/langchain_agent.py"]
          env:
            - name: KUBERNETES_MODE
              value: "true"
            - name: CODE_OUTPUT_DIR
              value: "/tmp/generated"
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: generated-code
              mountPath: /tmp/generated
      volumes:
        - name: generated-code
          persistentVolumeClaim:
            claimName: generated-code-pvc
---
