apiVersion: v1
kind: ServiceAccount
metadata:
  name: fibonacci-agent-sa
  namespace: fibonacci-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fibonacci-agent-role
  namespace: fibonacci-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fibonacci-agent-rolebinding
  namespace: fibonacci-agent
subjects:
  - kind: ServiceAccount
    name: fibonacci-agent-sa
    namespace: fibonacci-agent
roleRef:
  kind: Role
  name: fibonacci-agent-role
  apiGroup: rbac.authorization.k8s.io
